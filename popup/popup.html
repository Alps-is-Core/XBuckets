<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Buckets</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="xb-popup">
    <!-- Header -->
    <div class="xb-header">
      <div class="xb-logo">
        <div class="xb-logo-icon">𝕏</div>
        <div class="xb-logo-text">Buckets</div>
      </div>
      <button id="xb-open-panel" class="xb-icon-btn" title="Open Side Panel">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
    </div>

    <!-- Create Bucket -->
    <div class="xb-create-section">
      <div class="xb-create-row">
        <button id="xb-emoji-btn" class="xb-emoji-picker-btn" title="Pick icon">📂</button>
        <input type="text" id="xb-bucket-name" placeholder="New bucket name..." maxlength="30" autocomplete="off">
        <input type="color" id="xb-bucket-color" value="#1DA1F2" class="xb-color-input" title="Bucket color">
        <button id="xb-create-btn" class="xb-create-btn" title="Create bucket">+</button>
      </div>
      <div id="xb-emoji-grid" class="xb-emoji-grid xb-hidden"></div>
    </div>

    <!-- Bucket List -->
    <div id="xb-bucket-list" class="xb-bucket-list">
      <div class="xb-loading">Loading...</div>
    </div>

    <!-- Stats Footer -->
    <div class="xb-footer">
      <span id="xb-stats"></span>
      <button id="xb-export-btn" class="xb-text-btn" title="Export all data">Export</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
